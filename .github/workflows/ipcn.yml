name: Auto Merge and Optimize China IP List

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Process
        run: |
          # 1. 下载源文件
          curl -fLsS --retry 3 -o v4_1.txt "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute.txt" || exit 1
          curl -fLsS --retry 3 -o v4_2.txt "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_IP_No_IPv6.txt" || exit 1
          curl -fLsS --retry 3 -o v6_1.txt "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute_v6.txt" || exit 1
          curl -fLsS --retry 3 -o v6_2.txt "https://github.com/X-Shelby/geoip/releases/download/latest/cn_v6.txt" || exit 1

          # 2. Python 深度聚合
          python3 -c "
          import ipaddress

          def process_ip(files, output_path, version):
              nets = []
              for f in files:
                  try:
                      with open(f, 'r') as src:
                          for line in src:
                              line = line.strip()
                              if '/' in line and not line.startswith(('#', ';')):
                                  try:
                                      net = ipaddress.ip_network(line, strict=False)
                                      if net.version == version:
                                          nets.append(net)
                                  except:
                                      continue
                  except: continue
              
              merged = ipaddress.collapse_addresses(nets)
              
              with open(output_path, 'w') as out:
                  for n in merged:
                      out.write(str(n) + '\n')

          if __name__ == '__main__':
              # 改回 .txt 后缀
              process_ip(['v4_1.txt', 'v4_2.txt'], 'surfing/china_ip_v4.txt', 4)
              process_ip(['v6_1.txt', 'v6_2.txt'], 'surfing/china_ip_v6.txt', 6)
          "
          rm v4_*.txt v6_*.txt

      - name: Commit and Push
        if: always()
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 确保 git add 包含 .txt 文件
          git add sing-box/*.json sing-box/*.srs surfing/*.yaml surfing/*.list surfing/*.mrs surfing/*.txt || true
          
          if ! git diff --staged --quiet; then
            git commit -m "🤖 auto-update: 同步本地镜像规则与远程规则分发 (Optimized TXT)"
            git push
            echo "🎉 自动编译的规则已更新推送！"
          else
            echo "💤 无变化，跳过提交。"
          fi
