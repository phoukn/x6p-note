name: Lint, Validate & Compile Rules

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早 6 点自动运行

permissions:
  contents: write

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files (For Linting)
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > changed.txt
          else
            git diff --name-only HEAD^ HEAD > changed.txt || touch changed.txt
          fi

      - name: Install tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq python3-pip gzip tar
          pip install flake8 yamllint --break-system-packages
          npm install -g markdownlint-cli
          
          echo "=== 下载 Mihomo ==="
          MIHOMO_URL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64-compatible") and contains(".gz")) | .browser_download_url' | head -n 1)
          curl -L -o mihomo.gz "$MIHOMO_URL"
          gzip -d mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

          echo "=== 下载 Sing-box ==="
          SING_URL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64.tar.gz")) | .browser_download_url' | head -n 1)
          curl -L -o sing-box.tar.gz "$SING_URL"
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/

      - name: Fetch upstream (AWAvenue-Ads)
        run: |
          echo "🔄 抓取 AWAvenue 去广告规则..."
          curl -L -o sing-box/AWAvenue-Ads-Rule-Singbox.json "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Singbox.json" || true

      - name: Fetch & Convert 10007 Hosts
        run: |
          python3 -c '
          import urllib.request, json, re
          url = "https://raw.githubusercontent.com/lingeringsound/10007/main/all"
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              content = urllib.request.urlopen(req).read().decode("utf-8")
          except Exception:
              exit(1)
              
          domains = set()
          for line in content.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              parts = line.split()
              if len(parts) >= 2 and parts[0] == "0.0.0.0":
                  domain = parts[1].lower()
                  if domain not in ("localhost", "localhost.localdomain", "broadcasthost"):
                      if re.match(r"^[a-z0-9]([a-z0-9.-]*[a-z0-9])?\.[a-z]{2,}$", domain):
                          domains.add(domain)
          domains = sorted(list(domains))
          
          with open("sing-box/adblock_10007.json", "w", encoding="utf-8") as f:
              json.dump({"version": 3, "rules": [{"domain_suffix": domains}]}, f, indent=2, ensure_ascii=False)
          with open("surfing/adblock_10007.yaml", "w", encoding="utf-8") as f:
              f.write("payload:\n" + "\n".join([f"  - DOMAIN-SUFFIX,{d}" for d in domains]) + "\n")
          with open("surfing/adblock_10007_domains.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(domains) + "\n")
          '

      - name: Compile 10007 Hosts to Mihomo .mrs
        run: |
          if [ -f "surfing/adblock_10007_domains.txt" ]; then
            rm -f surfing/adblock_10007.mrs
            mihomo convert-ruleset domain text surfing/adblock_10007_domains.txt surfing/adblock_10007.mrs || true
            rm -f surfing/adblock_10007_domains.txt
          fi

      # ================= 修改：智能提取 classical 格式的 cn-additional =================
      - name: Fetch & Convert cn-additional-list (Classical YAML -> Sing-box)
        run: |
          python3 -c '
          import urllib.request, json
          url = "https://static-file-global.353355.xyz/rules/cn-additional-list-clash-classical.yaml"
          print("📥 正在下载 cn-additional-list-clash-classical.yaml...")
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              content = urllib.request.urlopen(req).read().decode("utf-8")
          except Exception as e:
              print(f"下载失败: {e}")
              exit(1)
              
          # 1. 保存供 Mihomo 原生使用 (去掉了冗长的后缀)
          with open("surfing/cn-additional-list.yaml", "w", encoding="utf-8") as f:
              f.write(content)
          print("✅ 已保存到 surfing/cn-additional-list.yaml")
          
          # 2. 提取 payload 列表并智能分类转换为 Sing-box 格式
          rules_map = {"DOMAIN": [], "DOMAIN-SUFFIX": [], "DOMAIN-KEYWORD": [], "DOMAIN-REGEX": [], "IP-CIDR": [], "IP-CIDR6": []}
          for line in content.splitlines():
              line = line.strip()
              # 匹配 yaml 列表项 (如: - DOMAIN-SUFFIX,000607.com.cn)
              if line.startswith("- "):
                  # 剥离前导符和可能存在的引号
                  rule = line[2:].strip().strip("\x27").strip("\x22")
                  parts = [p.strip() for p in rule.split(",")]
                  if len(parts) >= 2:
                      rtype, payload = parts[0].upper(), parts[1]
                      if rtype in rules_map:
                          rules_map[rtype].append(payload)
                          
          singbox_rule = {}
          mapping = {
              "DOMAIN": "domain", 
              "DOMAIN-SUFFIX": "domain_suffix", 
              "DOMAIN-KEYWORD": "domain_keyword", 
              "DOMAIN-REGEX": "domain_regex", 
              "IP-CIDR": "ip_cidr", 
              "IP-CIDR6": "ip_cidr"
          }
          
          for c_type, s_type in mapping.items():
              if rules_map[c_type]:
                  if s_type not in singbox_rule: singbox_rule[s_type] = []
                  singbox_rule[s_type].extend(rules_map[c_type])
                  
          for k in singbox_rule:
              singbox_rule[k] = sorted(list(set(singbox_rule[k]))) # 去重排序
              
          singbox_json = {"version": 3, "rules": [singbox_rule] if singbox_rule else []}
          
          with open("sing-box/cn-additional-list.json", "w", encoding="utf-8") as f:
              json.dump(singbox_json, f, indent=2, ensure_ascii=False)
          print("✅ 已智能转换并保存到 sing-box/cn-additional-list.json")
          '
      # =================================================================================

      - name: Compile ALL Sing-box Rule-sets (.json -> .srs)
        run: |
          echo "🔄 扫描并编译 Sing-box 规则集..."
          for f in sing-box/*.json; do
            [ -e "$f" ] || continue 
            if grep -q '"version"' "$f" && grep -q '"rules"' "$f"; then
              srs_file="${f%.json}.srs"
              rm -f "$srs_file"
              sing-box rule-set compile "$f" -o "$srs_file" || echo "::error file=$f::Sing-box 编译失败"
            else
              sing-box check -c "$f" || echo "::warning file=$f::Sing-box 配置格式有误"
            fi
          done

      - name: Format & Validate Mihomo Rules (.list syntax check)
        run: |
          echo "🔄 修复并校验 Mihomo 规则 (.list)..."
          export LC_ALL=C.UTF-8
          for f in surfing/*.list; do
            [ -e "$f" ] || continue
            sed -i 's/\r$//' "$f"
            sed -i '1s/^\xEF\xBB\xBF//' "$f"
            awk -F, '
              /^\s*(#|\/\/|;|$)/ {next} 
              {
                type = toupper($1); gsub(/^[ \t]+|[ \t]+$/, "", type);
                if (NF < 2) {
                  print "::warning file=" FILENAME ",line=" NR "::缺少逗号 -> " $0
                  next
                }
                if (type !~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-REGEX|IP-CIDR|IP-CIDR6|GEOIP|SRC-IP-CIDR|SRC-PORT|DST-PORT|PROCESS-NAME|PROCESS-PATH|IP-ASN|RULE-SET)$/) {
                  print "::error file=" FILENAME ",line=" NR "::未知的规则类型 [" type "]"
                }
              }
            ' "$f"
          done

      - name: Lint changed Markdown, Scripts, Hosts & YAML configs
        run: |
          IFS=$'\n'
          for f in $(grep -E '\.md$' changed.txt || true); do [ -n "$f" ] && markdownlint "$f" || true; done
          for f in $(grep -E '\.sh$' changed.txt || true); do [ -n "$f" ] && shellcheck "$f" || true; done
          for f in $(grep -E '\.py$' changed.txt || true); do [ -n "$f" ] && flake8 --ignore=E501 "$f" || true; done
          for f in $(grep -E '\.js$' changed.txt || true); do [ -n "$f" ] && node --check "$f" || true; done
          
          if grep -q '^hosts/host$' changed.txt; then
            awk '!/^\s*(#|$)/ {if (NF < 2 || $1 !~ /^(#|([0-9a-fA-F:.]+))$/) {print "::error line="NR"::hosts 格式异常"; exit 1}}' "hosts/host" || true
          fi
          
          for f in $(grep -E 'surfing/.*\.ya?ml$' changed.txt || true); do
            [ -z "$f" ] && continue
            yamllint -d "{extends: relaxed, rules: {line-length: disable}}" "$f" || true
            # 跳过 payload 规则文件的内核测试，防止报错
            if grep -q '^payload:' "$f"; then
              echo "✅ 跳过规则集 (payload) 的内核检查: $f"
            else
              mihomo -t -f "$f" || echo "::error file=$f::Mihomo yaml语法错误"
            fi
          done

      - name: Commit and Push
        if: always()
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add sing-box/AWAvenue-Ads-Rule-Singbox.json || true
          git add sing-box/adblock_10007.json surfing/adblock_10007.yaml surfing/adblock_10007.mrs || true
          
          # 更新的 cn-additional 文件记录
          git add surfing/cn-additional-list.yaml sing-box/cn-additional-list.json || true
          
          find sing-box -name "*.srs" -exec git add {} + || true
          git add surfing/*.list || true
          
          if ! git diff --staged --quiet; then
            git commit -m "🤖 auto-update: 同步远程 classical 规则并双端编译分发"
            git push
            echo "🎉 自动编译的规则与远程订阅已更新推送！"
          else
            echo "💤 源码无变化，数据与昨日一致，跳过提交。"
          fi
