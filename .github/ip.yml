name: Auto Merge and Optimize China IP List

on:
  schedule:
    - cron: '0 0 * * *' # 北京時間 08:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Process
        run: |
          # 1. 健壯下載：-o 配合 -f，失敗則中斷
          curl -fLsS --retry 3 -o v4_1.txt "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute.txt" || exit 1
          curl -fLsS --retry 3 -o v4_2.txt "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_IP_No_IPv6.txt" || exit 1
          curl -fLsS --retry 3 -o v6_1.txt "https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute_v6.txt" || exit 1
          curl -fLsS --retry 3 -o v6_2.txt "https://github.com/X-Shelby/geoip/releases/download/latest/cn_v6.txt" || exit 1

          # 2. Python 深度聚合：處理重疊網段、主機位修正 (strict=False)
          python3 -c "
          import ipaddress

          def process_ip(files, output_path, version):
              nets = []
              for f in files:
                  try:
                      with open(f, 'r') as src:
                          for line in src:
                              line = line.strip()
                              if '/' in line and not line.startswith(('#', ';')):
                                  try:
                                      # strict=False 確保主機位非零的條目也能被自動規整
                                      net = ipaddress.ip_network(line, strict=False)
                                      if net.version == version:
                                          nets.append(net)
                                  except:
                                      continue
                  except: continue
              
              # 合併連續與重疊網段
              merged = ipaddress.collapse_addresses(nets)
              
              with open(output_path, 'w') as out:
                  for n in merged:
                      out.write(str(n) + '\n')

          if __name__ == '__main__':
              # 直接輸出到 surfing 文件夾
              process_ip(['v4_1.txt', 'v4_2.txt'], 'surfing/china_ip_v4.list', 4)
              process_ip(['v6_1.txt', 'v6_2.txt'], 'surfing/china_ip_v6.list', 6)
          "
          
          # 3. 清理臨時下載文件
          rm v4_*.txt v6_*.txt

      - name: Commit and Push
        if: always()
        run: |
          # 使用你指定的 bot 賬號信息
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有相關規則文件
          git add sing-box/*.json sing-box/*.srs surfing/*.yaml surfing/*.list surfing/*.mrs || true
          
          # 檢查是否有變動
          if ! git diff --staged --quiet; then
            git commit -m "🤖 auto-update: 同步本地鏡像規則與遠程規則分發 (v4/v6 optimized)"
            git push
            echo "🎉 自動編譯的規則與遠程訂閱已更新推送！"
          else
            echo "💤 原始碼無變化，數據與昨日一致，跳過提交。"
          fi
